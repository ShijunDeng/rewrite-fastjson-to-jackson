---
type: specs.openrewrite.org/v1beta/recipe
name: com.huawei.clouds.openrewrite.shedlockspring.MigrateShedLockSpringTo7_2_1
displayName: Migrate ShedLock Spring applications to 7.2.1
description: Upgrade ShedLock Spring and move the SchedulerLock annotation exported by ShedLock 2.x to its supported Spring package.
tags:
  - shedlock
  - spring
  - java
  - source-migration
recipeList:
  - com.huawei.clouds.openrewrite.shedlockspring.UpgradeShedLockSpringDependencyTo7_2_1
  - org.openrewrite.java.ChangeType:
      oldFullyQualifiedTypeName: net.javacrumbs.shedlock.core.SchedulerLock
      newFullyQualifiedTypeName: net.javacrumbs.shedlock.spring.annotation.SchedulerLock
  - org.openrewrite.java.ChangeAnnotationAttributeName:
      annotationType: net.javacrumbs.shedlock.spring.annotation.SchedulerLock
      oldAttributeName: lockAtMostForString
      newAttributeName: lockAtMostFor
  - org.openrewrite.java.ChangeAnnotationAttributeName:
      annotationType: net.javacrumbs.shedlock.spring.annotation.SchedulerLock
      oldAttributeName: lockAtLeastForString
      newAttributeName: lockAtLeastFor
