---
type: specs.openrewrite.org/v1beta/category
name: com.huawei.clouds.openrewrite.hibernatevalidator
packageName: com.huawei.clouds.openrewrite.hibernatevalidator
description: Upgrade Hibernate Validator and Jakarta Validation together.
---
type: specs.openrewrite.org/v1beta/recipe
name: com.huawei.clouds.openrewrite.hibernatevalidator.UpgradeHibernateValidatorTo8
displayName: Upgrade Hibernate Validator to 8.0.3.Final
description: Upgrade Hibernate Validator, replace the Bean Validation API dependency, and migrate javax.validation source references to jakarta.validation.
tags:
  - hibernate-validator
  - jakarta-validation
  - java
  - dependency-upgrade
recipeList:
  - org.openrewrite.java.dependencies.UpgradeDependencyVersion:
      groupId: org.hibernate.validator
      artifactId: hibernate-validator
      newVersion: 8.0.3.Final
      overrideManagedVersion: true
  - org.openrewrite.java.dependencies.ChangeDependency:
      oldGroupId: javax.validation
      oldArtifactId: validation-api
      newGroupId: jakarta.validation
      newArtifactId: jakarta.validation-api
      newVersion: 3.0.2
      overrideManagedVersion: true
      changeManagedDependency: true
  - org.openrewrite.java.ChangePackage:
      oldPackageName: javax.validation
      newPackageName: jakarta.validation
      recursive: true
