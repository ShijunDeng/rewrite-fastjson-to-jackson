type: specs.openrewrite.org/v1beta/recipe
name: com.huawei.clouds.openrewrite.hikaricp.PreserveDisabledKeepaliveInSpringProperties
displayName: Preserve disabled Hikari keepalive in Spring properties
description: When an application.properties file has explicit Spring Hikari settings but no keepalive setting, add zero to preserve the HikariCP 3.x/4.x disabled default.
preconditions:
  - org.openrewrite.properties.search.FindProperties:
      propertyKey: spring.datasource.hikari.*
      relaxedBinding: true
recipeList:
  - org.openrewrite.properties.AddProperty:
      property: spring.datasource.hikari.keepalive-time
      value: 0
      comment: HikariCP 6.2.1 defaults keepalive to 120000ms; zero preserves the 3.x/4.x behavior
      delimiter: "="
      orderedInsertion: true
---
type: specs.openrewrite.org/v1beta/recipe
name: com.huawei.clouds.openrewrite.hikaricp.PreserveDisabledKeepaliveInSpringYaml
displayName: Preserve disabled Hikari keepalive in Spring YAML
description: When structured Spring YAML has explicit Hikari settings but no keepalive setting, add zero to preserve the HikariCP 3.x/4.x disabled default.
preconditions:
  - org.openrewrite.yaml.search.FindProperty:
      propertyKey: spring.datasource.hikari.*
      relaxedBinding: true
recipeList:
  - org.openrewrite.yaml.MergeYaml:
      key: $.spring.datasource.hikari
      yaml: |
        keepalive-time: 0
      acceptTheirs: true
      createNewKeys: true
---
