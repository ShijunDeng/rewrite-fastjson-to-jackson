---
type: specs.openrewrite.org/v1beta/recipe
name: com.huawei.clouds.openrewrite.springkafka.UpgradeSpringKafkaTo3_3_15
displayName: Upgrade workbook-selected Spring Kafka dependencies to 3.3.15
description: >-
  Upgrade only exact org.springframework.kafka:spring-kafka versions 2.8.11 and
  2.9.5 in unambiguously owned standard Maven or root Gradle declarations.
tags:
  - spring
  - kafka
  - java
  - dependency-upgrade
recipeList:
  - com.huawei.clouds.openrewrite.springkafka.UpgradeSelectedSpringKafkaDependency
---
type: specs.openrewrite.org/v1beta/recipe
name: com.huawei.clouds.openrewrite.springkafka.MigrateDeterministicSpringKafka3Java
displayName: Migrate deterministic Spring Kafka 3 Java APIs
description: >-
  Compose the official OpenRewrite Spring Kafka recipes for CompletableFuture,
  KafkaTestUtils Duration, KafkaOperations2, removed header constants and
  deprecated error handlers. Dependency upgrading remains under the strict
  local whitelist recipe.
tags:
  - spring
  - kafka
  - source-migration
  - official-openrewrite
# This is the complete safe child list from rewrite-spring 6.35.0's
# UpgradeSpringKafka_3_0, excluding only its broad 3.0.x dependency upgrade.
# SpringKafkaOfficialMigrationTest compares the runtime trees and exact options.
preconditions:
  - com.huawei.clouds.openrewrite.springkafka.FindSpringKafkaAuthoredSourceFiles
recipeList:
  - org.openrewrite.java.spring.kafka.KafkaOperationsSendReturnType
  - org.openrewrite.java.spring.kafka.KafkaTestUtilsDuration
  - org.openrewrite.java.ChangeType:
      oldFullyQualifiedTypeName: org.springframework.kafka.core.KafkaOperations2
      newFullyQualifiedTypeName: org.springframework.kafka.core.KafkaOperations
  - org.openrewrite.java.spring.kafka.RemoveUsingCompletableFuture
  - org.openrewrite.java.ReplaceConstantWithAnotherConstant:
      existingFullyQualifiedConstantName: org.springframework.kafka.support.KafkaHeaders.MESSAGE_KEY
      fullyQualifiedConstantName: org.springframework.kafka.support.KafkaHeaders.KEY
  - org.openrewrite.java.ReplaceConstantWithAnotherConstant:
      existingFullyQualifiedConstantName: org.springframework.kafka.support.KafkaHeaders.PARTITION_ID
      fullyQualifiedConstantName: org.springframework.kafka.support.KafkaHeaders.PARTITION
  - org.openrewrite.java.ReplaceConstantWithAnotherConstant:
      existingFullyQualifiedConstantName: org.springframework.kafka.support.KafkaHeaders.RECEIVED_MESSAGE_KEY
      fullyQualifiedConstantName: org.springframework.kafka.support.KafkaHeaders.RECEIVED_KEY
  - org.openrewrite.java.ReplaceConstantWithAnotherConstant:
      existingFullyQualifiedConstantName: org.springframework.kafka.support.KafkaHeaders.RECEIVED_PARTITION_ID
      fullyQualifiedConstantName: org.springframework.kafka.support.KafkaHeaders.RECEIVED_PARTITION
  - org.openrewrite.java.spring.kafka.UpgradeSpringKafka_2_8_ErrorHandlers
