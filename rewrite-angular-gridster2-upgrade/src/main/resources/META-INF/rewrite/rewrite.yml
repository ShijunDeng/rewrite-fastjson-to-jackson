type: specs.openrewrite.org/v1beta/recipe
name: com.huawei.clouds.openrewrite.angulargridster2.MigrateDeterministicAngularGridster2SourceTo20
displayName: Migrate deterministic angular-gridster2 source constructs to version 20
description: Normalize known public deep imports, make the optional optionsChanged API strict-safe, modernize simple identity Gridster item loops, and use standalone components in strictly matched standalone files.
tags:
  - angular-gridster2
  - angular
  - typescript
  - source-migration
preconditions:
