      find: '(?:angular-gridster2|<gridster(?:[ >-]))'
      regex: true
      caseSensitive: true
      filePattern: "**/*.{ts,tsx,mts,cts,html}"
      contextSize: 0
recipeList:
  - com.huawei.clouds.openrewrite.angulargridster2.MigrateStandaloneGridsterModuleToComponents
  - org.openrewrite.text.FindAndReplace:
      find: '(?<quote>["''])angular-gridster2/(?:lib/)?(?:gridster\.component|gridsterItem\.component|gridsterItem\.interface|gridster\.interface|gridsterConfig\.interface|gridsterConfig\.constant|gridster\.module|gridsterPush\.service|gridsterPushResize\.service|gridsterSwap\.service)\k<quote>'
      replace: '${quote}angular-gridster2${quote}'
      regex: true
      filePattern: "**/*.{ts,tsx,mts,cts}"
      plaintextOnly: false
  - org.openrewrite.text.FindAndReplace:
      find: '\bif[ \t]*\([ \t]*this\.options\.api[ \t]*\)[ \t]*this\.options\.api\.optionsChanged[ \t]*\([ \t]*\)[ \t]*;'
      replace: 'this.options.api?.optionsChanged?.();'
      regex: true
      filePattern: "**/*.{ts,tsx,mts,cts}"
      plaintextOnly: false
  - org.openrewrite.text.FindAndReplace:
      find: '\bthis\.options\.api(?:[ \t]*\?)?\.(?:[ \t]*\?)?optionsChanged(?:[ \t]*\?)?[ \t]*\([ \t]*\)'
      replace: 'this.options.api?.optionsChanged?.()'
      regex: true
      filePattern: "**/*.{ts,tsx,mts,cts}"
      plaintextOnly: false
  - org.openrewrite.text.FindAndReplace:
      find: '(?m)^(?<indent>[ \t]*)<gridster-item(?<before>[^>]*?)[ \t\r\n]+\*ngFor=(?<quote>["''])let[ \t]+(?<item>[A-Za-z_$][A-Za-z0-9_$]*)[ \t]+of[ \t]+(?<items>[A-Za-z_$][A-Za-z0-9_$]*(?:\.[A-Za-z_$][A-Za-z0-9_$]*)*)\k<quote>(?<after>[^>]*)>(?<body>(?s:.*?))^[ \t]*</gridster-item>'
      replace: |-
        ${indent}@for (${item} of ${items}; track ${item}) {
        ${indent}  <gridster-item${before}${after}>${body}${indent}  </gridster-item>
        ${indent}}
      regex: true
      multiline: true
      filePattern: "**/*.html"
      plaintextOnly: false
