---
type: specs.openrewrite.org/v1beta/recipe
name: com.huawei.clouds.openrewrite.kafka.UpgradeKafkaClientsDependencyTo4_1_2
displayName: Upgrade kafka-clients to 4.1.2
description: Upgrade only exact spreadsheet-selected org.apache.kafka:kafka-clients versions in direct Maven and Gradle declarations; leave ranges, dynamic versions, BOM-managed declarations, unlisted versions, and other Kafka artifacts unchanged.
tags:
  - apache-kafka
  - kafka-clients
  - java
  - dependency-upgrade
recipeList:
  - com.huawei.clouds.openrewrite.kafka.UpgradeSelectedKafkaClientsDependency
---
type: specs.openrewrite.org/v1beta/recipe
name: com.huawei.clouds.openrewrite.kafka.MigrateKafkaClientsTo4_1_2
displayName: Migrate Apache Kafka clients to 4.1.2
description: Upgrade selected kafka-clients declarations, apply one-to-one Kafka 4.1 API and property replacements, and mark behavior-sensitive migration work.
tags:
  - apache-kafka
  - kafka-clients
  - java
  - source-migration
recipeList:
  - com.huawei.clouds.openrewrite.kafka.UpgradeKafkaClientsDependencyTo4_1_2
  - org.openrewrite.java.ChangeMethodName:
      methodPattern: org.apache.kafka.clients.admin.DescribeTopicsResult values()
      newMethodName: topicNameValues
  - org.openrewrite.java.ChangeMethodName:
      methodPattern: org.apache.kafka.clients.admin.DescribeTopicsResult all()
      newMethodName: allTopicNames
  - org.openrewrite.java.ChangeMethodName:
      methodPattern: org.apache.kafka.clients.admin.DeleteTopicsResult values()
      newMethodName: topicNameValues
  - org.openrewrite.java.ChangeMethodName:
      methodPattern: org.apache.kafka.clients.consumer.MockConsumer setException(org.apache.kafka.common.KafkaException)
      newMethodName: setPollException
  - org.openrewrite.java.ChangeMethodName:
      methodPattern: org.apache.kafka.clients.admin.UpdateFeaturesOptions dryRun(boolean)
      newMethodName: validateOnly
  - org.openrewrite.java.ChangeType:
      oldFullyQualifiedTypeName: org.apache.kafka.common.security.oauthbearer.secured.OAuthBearerLoginCallbackHandler
      newFullyQualifiedTypeName: org.apache.kafka.common.security.oauthbearer.OAuthBearerLoginCallbackHandler
  - org.openrewrite.java.ChangeType:
      oldFullyQualifiedTypeName: org.apache.kafka.common.security.oauthbearer.secured.OAuthBearerValidatorCallbackHandler
      newFullyQualifiedTypeName: org.apache.kafka.common.security.oauthbearer.OAuthBearerValidatorCallbackHandler
  - org.openrewrite.properties.ChangePropertyKey:
      oldPropertyKey: metrics.jmx.blacklist
      newPropertyKey: metrics.jmx.exclude
      relaxedBinding: false
      regex: false
  - org.openrewrite.properties.ChangePropertyKey:
      oldPropertyKey: metrics.jmx.whitelist
      newPropertyKey: metrics.jmx.include
      relaxedBinding: false
      regex: false
  - org.openrewrite.properties.DeleteProperty:
      propertyKey: auto.include.jmx.reporter
      relaxedBinding: false
  - com.huawei.clouds.openrewrite.kafka.FindKafkaClientJavaMigrationRisks
  - com.huawei.clouds.openrewrite.kafka.FindKafkaClientPropertiesRisks
