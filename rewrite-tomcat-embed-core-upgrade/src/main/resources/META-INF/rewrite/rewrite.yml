name: com.huawei.clouds.openrewrite.tomcatembedcore.MigrateTomcatEmbedCoreTo10_1_57
displayName: Migrate Tomcat Embed Core to 10.1.57
description: >-
  Capture upgrade-time build-root eligibility, apply the strict dependency
