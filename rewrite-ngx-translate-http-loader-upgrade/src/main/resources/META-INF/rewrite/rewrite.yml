type: specs.openrewrite.org/v1beta/recipe
name: com.huawei.clouds.openrewrite.ngxtranslate.FindManualHttpLoader17MigrationRisks
displayName: Find ngx-translate HTTP loader 17 migration risks requiring review
description: Mark constructor calls and provider shapes that could not be converted safely, custom loader contracts, cache/interceptor behavior switches, browser-dependent paths, and HTTP registration sites.
tags:
  - ngx-translate
  - angular
  - search
  - manual-review
preconditions:
  - org.openrewrite.text.Find:
      find: '@ngx-translate/(?:http-loader|core)'
      regex: true
      caseSensitive: true
      filePattern: "**/*.{ts,tsx,mts,cts}"
      contextSize: 0
recipeList:
  - org.openrewrite.text.Find:
      find: '\bnew[ \t]+TranslateHttpLoader[ \t]*\('
      regex: true
      caseSensitive: true
      filePattern: "**/*.{ts,tsx,mts,cts}"
      contextSize: 80
  - org.openrewrite.text.Find:
      find: '\bloader[ \t\r\n]*:[ \t\r\n]*\{[ \t\r\n]*provide[ \t\r\n]*:[ \t\r\n]*TranslateLoader\b'
      regex: true
      caseSensitive: true
      filePattern: "**/*.{ts,tsx,mts,cts}"
      contextSize: 80
  - org.openrewrite.text.Find:
      find: '\bimplements[ \t]+TranslateLoader\b|\bgetTranslation[ \t]*\('
      regex: true
      caseSensitive: true
      filePattern: "**/*.{ts,tsx,mts,cts}"
      contextSize: 80
  - org.openrewrite.text.Find:
      find: '\b(?:useHttpBackend|enforceLoading)[ \t]*:[ \t]*true\b'
      regex: true
      caseSensitive: true
      filePattern: "**/*.{ts,tsx,mts,cts}"
      contextSize: 80
  - org.openrewrite.text.Find:
      find: '\bprovideTranslateHttpLoader[ \t]*\([ \t]*\{[^}]*(?:window|document|location|environment|BASE_URL|APP_BASE_HREF)\b'
      regex: true
      caseSensitive: true
      filePattern: "**/*.{ts,tsx,mts,cts}"
      contextSize: 80
  - org.openrewrite.text.Find:
      find: '\b(?:HttpClientModule|provideHttpClient)[ \t]*(?:\b|\()'
      regex: true
      caseSensitive: true
      filePattern: "**/*.{ts,tsx,mts,cts}"
      contextSize: 40
