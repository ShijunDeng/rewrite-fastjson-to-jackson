displayName: Migrate MyBatis Spring Boot Starter applications to 4.0.0
description: Apply source and configuration changes proven by the 4.0.0 target, mark application-specific decisions, and strictly upgrade only the spreadsheet source versions.
tags:
  - mybatis
  - mybatis-spring
  - spring-boot
  - spring-batch
  - java
  - migration
recipeList:
  - org.openrewrite.properties.ChangePropertyKey:
      oldPropertyKey: mybatis.configuration.default-scripting-language
      newPropertyKey: mybatis.default-scripting-language-driver
      relaxedBinding: false
      regex: false
  - org.openrewrite.yaml.ChangePropertyKey:
      oldPropertyKey: mybatis.configuration.default-scripting-language
      newPropertyKey: mybatis.default-scripting-language-driver
      relaxedBinding: true
  - org.openrewrite.properties.ChangePropertyKey:
      oldPropertyKey: mybatis.scripting-language-driver.velocity.userdirective
      newPropertyKey: mybatis.scripting-language-driver.velocity.velocity-settings.runtime.custom_directives
      relaxedBinding: false
      regex: false
  - org.openrewrite.yaml.ChangePropertyKey:
      oldPropertyKey: mybatis.scripting-language-driver.velocity.userdirective
      newPropertyKey: mybatis.scripting-language-driver.velocity.velocity-settings.runtime.custom_directives
      relaxedBinding: true
  - com.huawei.clouds.openrewrite.mybatisspringboot.MigrateMyBatisSpringXmlSchema
  - org.openrewrite.java.ChangeType:
      oldFullyQualifiedTypeName: org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      newFullyQualifiedTypeName: org.springframework.boot.jdbc.autoconfigure.DataSourceAutoConfiguration
  - org.openrewrite.java.ChangeType:
      oldFullyQualifiedTypeName: org.springframework.boot.autoconfigure.jdbc.EmbeddedDataSourceConfiguration
      newFullyQualifiedTypeName: org.springframework.boot.jdbc.autoconfigure.EmbeddedDataSourceConfiguration
  - org.openrewrite.java.ChangeType:
      oldFullyQualifiedTypeName: org.springframework.boot.autoconfigure.flyway.FlywayAutoConfiguration
      newFullyQualifiedTypeName: org.springframework.boot.flyway.autoconfigure.FlywayAutoConfiguration
  - org.openrewrite.java.ChangeType:
      oldFullyQualifiedTypeName: org.springframework.boot.autoconfigure.flyway.FlywayMigrationInitializer
      newFullyQualifiedTypeName: org.springframework.boot.flyway.autoconfigure.FlywayMigrationInitializer
  - org.openrewrite.java.ChangeType:
      oldFullyQualifiedTypeName: org.springframework.boot.autoconfigure.liquibase.LiquibaseAutoConfiguration
      newFullyQualifiedTypeName: org.springframework.boot.liquibase.autoconfigure.LiquibaseAutoConfiguration
  - org.openrewrite.java.ChangeType:
      oldFullyQualifiedTypeName: org.springframework.boot.test.autoconfigure.core.AutoConfigureCache
      newFullyQualifiedTypeName: org.springframework.boot.cache.test.autoconfigure.AutoConfigureCache
  - org.openrewrite.java.ChangeType:
      oldFullyQualifiedTypeName: org.springframework.boot.test.autoconfigure.jdbc.AutoConfigureTestDatabase
      newFullyQualifiedTypeName: org.springframework.boot.jdbc.test.autoconfigure.AutoConfigureTestDatabase
  - org.openrewrite.java.ChangeType:
      oldFullyQualifiedTypeName: org.springframework.boot.test.autoconfigure.filter.AnnotationCustomizableTypeExcludeFilter
      newFullyQualifiedTypeName: org.springframework.boot.test.context.filter.AnnotationCustomizableTypeExcludeFilter
  - org.openrewrite.java.ChangeType:
      oldFullyQualifiedTypeName: org.springframework.boot.test.autoconfigure.filter.TypeExcludeFilters
      newFullyQualifiedTypeName: org.springframework.boot.test.context.filter.TypeExcludeFilters
  - com.huawei.clouds.openrewrite.mybatisspringboot.MigrateSimpleMockBean
  - org.openrewrite.java.ChangeType:
      oldFullyQualifiedTypeName: org.springframework.boot.test.web.client.TestRestTemplate
      newFullyQualifiedTypeName: org.springframework.boot.resttestclient.TestRestTemplate
  - com.huawei.clouds.openrewrite.mybatisspringboot.AddAutoConfigureTestRestTemplate
  - org.openrewrite.java.ChangePackage:
      oldPackageName: org.springframework.batch.item
      newPackageName: org.springframework.batch.infrastructure.item
      recursive: true
  - org.openrewrite.java.ChangePackage:
      oldPackageName: org.springframework.batch.poller
      newPackageName: org.springframework.batch.infrastructure.poller
      recursive: true
  - org.openrewrite.java.ChangePackage:
