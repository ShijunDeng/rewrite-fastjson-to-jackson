  - com.huawei.clouds.openrewrite.mybatisspringboot.FindMyBatisStarterPropertiesRisks
  - com.huawei.clouds.openrewrite.mybatisspringboot.FindMyBatisStarterYamlRisks
  - com.huawei.clouds.openrewrite.mybatisspringboot.FindMyBatisStarterXmlRisks
  - com.huawei.clouds.openrewrite.mybatisspringboot.FindMyBatisStarterMavenPlatformRisks
