type: specs.openrewrite.org/v1beta/recipe
name: com.huawei.clouds.openrewrite.springdataelasticsearch.MigrateSpringDataElasticsearchTo6_0_5
displayName: Migrate Spring Data Elasticsearch applications to 6.0.5
description: Upgrade the dependency, apply source-compatible Spring Data type moves, and mark removed client, query, mapping, repository, cache, and reactive APIs that need an explicit application decision.
tags:
  - spring-data
  - elasticsearch
  - java
  - migration
recipeList:
  - com.huawei.clouds.openrewrite.springdataelasticsearch.UpgradeSpringDataElasticsearchDependencyTo6_0_5
  - org.openrewrite.java.ChangeType:
      oldFullyQualifiedTypeName: org.springframework.data.elasticsearch.core.query.NativeSearchQuery
      newFullyQualifiedTypeName: org.springframework.data.elasticsearch.client.elc.NativeQuery
      ignoreDefinition: true
  - org.openrewrite.java.ChangeType:
      oldFullyQualifiedTypeName: org.springframework.data.elasticsearch.core.query.NativeSearchQueryBuilder
      newFullyQualifiedTypeName: org.springframework.data.elasticsearch.client.elc.NativeQueryBuilder
      ignoreDefinition: true
  - org.openrewrite.java.ChangeType:
      oldFullyQualifiedTypeName: org.springframework.data.elasticsearch.core.Range
      newFullyQualifiedTypeName: org.springframework.data.domain.Range
      ignoreDefinition: true
  - org.openrewrite.java.ChangeType:
      oldFullyQualifiedTypeName: org.springframework.data.elasticsearch.ELCQueries
      newFullyQualifiedTypeName: org.springframework.data.elasticsearch.client.elc.Queries
      ignoreDefinition: true
  - org.openrewrite.java.ChangeType:
      oldFullyQualifiedTypeName: org.springframework.data.elasticsearch.client.elc.QueryBuilders
      newFullyQualifiedTypeName: org.springframework.data.elasticsearch.client.elc.Queries
      ignoreDefinition: true
  - org.openrewrite.java.ChangeType:
      oldFullyQualifiedTypeName: org.springframework.data.elasticsearch.core.completion.Completion
      newFullyQualifiedTypeName: org.springframework.data.elasticsearch.core.suggest.Completion
      ignoreDefinition: true
  - org.openrewrite.java.ChangeType:
      oldFullyQualifiedTypeName: org.springframework.data.elasticsearch.core.mapping.ElasticsearchPersistentPropertyConverter
      newFullyQualifiedTypeName: org.springframework.data.elasticsearch.core.mapping.PropertyValueConverter
      ignoreDefinition: true
  - org.openrewrite.java.ChangeType:
      oldFullyQualifiedTypeName: org.springframework.data.elasticsearch.core.RuntimeField
      newFullyQualifiedTypeName: org.springframework.data.elasticsearch.core.query.RuntimeField
      ignoreDefinition: true
  - com.huawei.clouds.openrewrite.springdataelasticsearch.AuditRemovedElasticsearchClients
  - com.huawei.clouds.openrewrite.springdataelasticsearch.AuditRemovedSpringDataElasticsearchApis
