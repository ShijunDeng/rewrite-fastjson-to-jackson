name: com.huawei.clouds.openrewrite.commonscodec.UpgradeSelectedCommonsCodecDependencyInMarkedProject
displayName: Upgrade the selected Apache Commons Codec dependency
description: >-
  Run the official model-aware Maven/Gradle dependency recipe first, then retain the strict literal/property-aware
