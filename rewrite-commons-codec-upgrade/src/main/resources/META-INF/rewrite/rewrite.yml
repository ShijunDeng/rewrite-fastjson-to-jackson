type: specs.openrewrite.org/v1beta/recipe
name: com.huawei.clouds.openrewrite.commonscodec.ApplyOfficialSafeApacheBase64Migration
displayName: Apply the official Apache Base64 migration where semantics are proven
description: >-
  Reuse org.openrewrite.apache.commons.codec.ApacheBase64ToJavaBase64 only for authored Java files whose complete
  Commons Codec Base64 use is limited to statically qualified encoding calls with non-null bounded literal inputs.
preconditions:
  - com.huawei.clouds.openrewrite.commonscodec.FindSelectedCommonsCodecSourceFiles
  - com.huawei.clouds.openrewrite.commonscodec.FindSafeOfficialCommonsCodecBase64Files
recipeList:
  - org.openrewrite.apache.commons.codec.ApacheBase64ToJavaBase64
---
type: specs.openrewrite.org/v1beta/recipe
name: com.huawei.clouds.openrewrite.commonscodec.MigrateDeterministicCommonsCodecJava
displayName: Migrate deterministic Apache Commons Codec Java APIs
description: >-
  Reuse the official semantically guarded Base64 recipe and OpenRewrite core ChangeMethodName and
  ReplaceConstantWithAnotherConstant leaves for every deterministic Java transformation.
preconditions:
  - com.huawei.clouds.openrewrite.commonscodec.FindSelectedCommonsCodecSourceFiles
  - com.huawei.clouds.openrewrite.commonscodec.FindAuthoredCommonsCodecJavaFiles
recipeList:
  - com.huawei.clouds.openrewrite.commonscodec.ApplyOfficialSafeApacheBase64Migration
  - org.openrewrite.java.ChangeMethodName:
      methodPattern: org.apache.commons.codec.digest.DigestUtils getShaDigest()
      newMethodName: getSha1Digest
      matchOverrides: false
      ignoreDefinition: true
  - org.openrewrite.java.ChangeMethodName:
      methodPattern: org.apache.commons.codec.digest.DigestUtils sha(..)
      newMethodName: sha1
      matchOverrides: false
      ignoreDefinition: true
  - org.openrewrite.java.ChangeMethodName:
      methodPattern: org.apache.commons.codec.digest.DigestUtils shaHex(..)
      newMethodName: sha1Hex
      matchOverrides: false
      ignoreDefinition: true
  - org.openrewrite.java.ChangeMethodName:
      methodPattern: org.apache.commons.codec.binary.Base64 isArrayByteBase64(byte[])
      newMethodName: isBase64
      matchOverrides: false
      ignoreDefinition: true
  - org.openrewrite.java.ReplaceConstantWithAnotherConstant:
      existingFullyQualifiedConstantName: org.apache.commons.codec.Charsets.ISO_8859_1
      fullyQualifiedConstantName: java.nio.charset.StandardCharsets.ISO_8859_1
  - org.openrewrite.java.ReplaceConstantWithAnotherConstant:
      existingFullyQualifiedConstantName: org.apache.commons.codec.Charsets.US_ASCII
      fullyQualifiedConstantName: java.nio.charset.StandardCharsets.US_ASCII
  - org.openrewrite.java.ReplaceConstantWithAnotherConstant:
      existingFullyQualifiedConstantName: org.apache.commons.codec.Charsets.UTF_16
      fullyQualifiedConstantName: java.nio.charset.StandardCharsets.UTF_16
  - org.openrewrite.java.ReplaceConstantWithAnotherConstant:
      existingFullyQualifiedConstantName: org.apache.commons.codec.Charsets.UTF_16BE
      fullyQualifiedConstantName: java.nio.charset.StandardCharsets.UTF_16BE
  - org.openrewrite.java.ReplaceConstantWithAnotherConstant:
      existingFullyQualifiedConstantName: org.apache.commons.codec.Charsets.UTF_16LE
      fullyQualifiedConstantName: java.nio.charset.StandardCharsets.UTF_16LE
  - org.openrewrite.java.ReplaceConstantWithAnotherConstant:
      existingFullyQualifiedConstantName: org.apache.commons.codec.Charsets.UTF_8
      fullyQualifiedConstantName: java.nio.charset.StandardCharsets.UTF_8
---
