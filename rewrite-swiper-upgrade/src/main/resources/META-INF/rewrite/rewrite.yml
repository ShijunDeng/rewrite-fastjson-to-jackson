---
type: specs.openrewrite.org/v1beta/recipe
name: com.huawei.clouds.openrewrite.swiper.UpgradeSwiperDependencyTo12_1_2
displayName: Upgrade the Swiper dependency to 12.1.2
description: Update only explicitly selected direct Swiper declarations in package.json without changing aliases, protocols, lockfiles, overrides, unlisted versions, or source code.
tags:
  - swiper
  - javascript
  - typescript
  - dependency-upgrade
preconditions:
  - org.openrewrite.FindSourceFiles:
      filePattern: package.json;**/package.json
recipeList:
  - com.huawei.clouds.openrewrite.swiper.UpgradeSelectedSwiperDependency
---
type: specs.openrewrite.org/v1beta/recipe
name: com.huawei.clouds.openrewrite.swiper.MigrateDeterministicSwiperSourceTo12
displayName: Migrate deterministic Swiper source constructs to version 12
description: Rewrite only unambiguous legacy Swiper JavaScript, TypeScript, stylesheet, and markup entry points, module imports, the v7 container class, and watchVisibleSlides option.
tags:
  - swiper
  - javascript
  - typescript
  - source-migration
recipeList:
  - org.openrewrite.text.FindAndReplace:
      find: '(?<quote>["''])swiper/(?:dist/)?js/swiper(?:\.min)?\.js\k<quote>'
      replace: '${quote}swiper${quote}'
      regex: true
      filePattern: "**/*.{js,jsx,ts,tsx,mjs,cjs,vue,svelte,html}"
      plaintextOnly: false
  - org.openrewrite.text.FindAndReplace:
      find: '(?<quote>["''])swiper/swiper(?:\.esm)?(?:\.min)?\.js\k<quote>'
      replace: '${quote}swiper${quote}'
      regex: true
      filePattern: "**/*.{js,jsx,ts,tsx,mjs,cjs,vue,svelte,html}"
      plaintextOnly: false
  - org.openrewrite.text.FindAndReplace:
      find: '(?<quote>["''])swiper/swiper-bundle(?:\.esm)?(?:\.min)?\.js\k<quote>'
      replace: '${quote}swiper/bundle${quote}'
      regex: true
      filePattern: "**/*.{js,jsx,ts,tsx,mjs,cjs,vue,svelte,html}"
      plaintextOnly: false
  - org.openrewrite.text.FindAndReplace:
      find: '(?<quote>["''])swiper/(?:dist/css/|css/|)swiper(?:\.min)?\.css\k<quote>'
      replace: '${quote}swiper/css${quote}'
      regex: true
      filePattern: "**/*.{js,jsx,ts,tsx,mjs,cjs,vue,svelte,html,css,scss,less}"
      plaintextOnly: false
  - org.openrewrite.text.FindAndReplace:
      find: '(?<quote>["''])swiper/(?:dist/css/|css/|)swiper-bundle(?:\.min)?\.css\k<quote>'
      replace: '${quote}swiper/css/bundle${quote}'
      regex: true
      filePattern: "**/*.{js,jsx,ts,tsx,mjs,cjs,vue,svelte,html,css,scss,less}"
      plaintextOnly: false
  - org.openrewrite.text.FindAndReplace:
      find: '(?<quote>["''])swiper/components/(?<module>a11y|autoplay|controller|effect-coverflow|effect-cube|effect-fade|effect-flip|free-mode|hash-navigation|history|keyboard|mousewheel|navigation|pagination|parallax|scrollbar|thumbs|virtual|zoom)/\k<module>(?:\.min)?\.css\k<quote>'
      replace: '${quote}swiper/css/${module}${quote}'
      regex: true
      filePattern: "**/*.{js,jsx,ts,tsx,mjs,cjs,vue,svelte,html,css,scss,less}"
      plaintextOnly: false
  - org.openrewrite.text.FindAndReplace:
      find: '(?<quote>["''])swiper/(?:scss|less)(?<module>/bundle|/a11y|/autoplay|/controller|/effect-coverflow|/effect-cube|/effect-fade|/effect-flip|/effect-creative|/effect-cards|/free-mode|/grid|/hash-navigation|/history|/keyboard|/manipulation|/mousewheel|/navigation|/pagination|/parallax|/scrollbar|/thumbs|/virtual|/zoom)?\k<quote>'
      replace: '${quote}swiper/css${module}${quote}'
      regex: true
      filePattern: "**/*.{js,jsx,ts,tsx,mjs,cjs,vue,svelte,html,css,scss,less}"
      plaintextOnly: false
  - org.openrewrite.text.FindAndReplace:
      find: '(?m)^(?<indent>[ \t]*)import[ \t]+(?<core>[A-Za-z_$][A-Za-z0-9_$]*)[ \t]*,[ \t\r\n]*\{(?<modules>[ \t\r\n]*(?:A11y|Autoplay|Controller|EffectCards|EffectCoverflow|EffectCreative|EffectCube|EffectFade|EffectFlip|FreeMode|Grid|HashNavigation|History|Keyboard|Manipulation|Mousewheel|Navigation|Pagination|Parallax|Scrollbar|Thumbs|Virtual|Zoom)(?:[ \t\r\n]*,[ \t\r\n]*(?:A11y|Autoplay|Controller|EffectCards|EffectCoverflow|EffectCreative|EffectCube|EffectFade|EffectFlip|FreeMode|Grid|HashNavigation|History|Keyboard|Manipulation|Mousewheel|Navigation|Pagination|Parallax|Scrollbar|Thumbs|Virtual|Zoom))*[ \t\r\n]*,?)[ \t\r\n]*\}[ \t]+from[ \t]+(?<quote>["''])swiper\k<quote>[ \t]*;?[ \t]*$'
      replace: |-
        ${indent}import ${core} from ${quote}swiper${quote};
        ${indent}import {${modules}} from ${quote}swiper/modules${quote};
      regex: true
      multiline: true
      filePattern: "**/*.{js,jsx,ts,tsx,mjs,vue,svelte}"
      plaintextOnly: false
  - org.openrewrite.text.FindAndReplace:
      find: '(?m)^(?<indent>[ \t]*)import[ \t]+\{(?<modules>[ \t]*(?:A11y|Autoplay|Controller|EffectCards|EffectCoverflow|EffectCreative|EffectCube|EffectFade|EffectFlip|FreeMode|Grid|HashNavigation|History|Keyboard|Manipulation|Mousewheel|Navigation|Pagination|Parallax|Scrollbar|Thumbs|Virtual|Zoom)(?:[ \t]*,[ \t]*(?:A11y|Autoplay|Controller|EffectCards|EffectCoverflow|EffectCreative|EffectCube|EffectFade|EffectFlip|FreeMode|Grid|HashNavigation|History|Keyboard|Manipulation|Mousewheel|Navigation|Pagination|Parallax|Scrollbar|Thumbs|Virtual|Zoom))*[ \t]*,?)[ \t]*\}[ \t]+from[ \t]+(?<quote>["''])swiper\k<quote>[ \t]*;?[ \t]*$'
      replace: '${indent}import {${modules}} from ${quote}swiper/modules${quote};'
      regex: true
      multiline: true
      filePattern: "**/*.{js,jsx,ts,tsx,mjs,vue,svelte}"
      plaintextOnly: false
  - org.openrewrite.text.FindAndReplace:
      find: '(?<![A-Za-z0-9_$])watchVisibleSlides(?=[ \t]*:)'
      replace: watchSlidesProgress
      regex: true
      filePattern: "**/*.{js,jsx,ts,tsx,mjs,cjs,vue,svelte}"
      plaintextOnly: false
  - org.openrewrite.text.FindAndReplace:
      find: '\.swiper-container(?![A-Za-z0-9_-])'
      replace: '.swiper'
      regex: true
      filePattern: "**/*.{js,jsx,ts,tsx,mjs,cjs,vue,svelte,html,css,scss,less}"
      plaintextOnly: false
  - org.openrewrite.text.FindAndReplace:
      find: '(?<prefix>\bclass(?:Name)?[ \t]*=[ \t]*["''][^"'']*(?<![A-Za-z0-9_-]))swiper-container(?<suffix>(?![A-Za-z0-9_-])[^"'']*["''])'
      replace: '${prefix}swiper${suffix}'
      regex: true
      filePattern: "**/*.{jsx,tsx,vue,svelte,html}"
      plaintextOnly: false
---
type: specs.openrewrite.org/v1beta/recipe
name: com.huawei.clouds.openrewrite.swiper.FindManualSwiper12MigrationRisks
displayName: Find Swiper 12 migration risks requiring manual review
description: Mark legacy wrappers, APIs, options, event assumptions, CommonJS loading, lazy loading, loop, multi-row grid, and custom module installation that cannot be rewritten safely without application semantics.
tags:
  - swiper
  - search
  - manual-review
recipeList:
  - org.openrewrite.text.Find:
      find: '(?:swiper/(?:angular|svelte|solid)|swiper/components/lazy/|Swiper\s*\.\s*use\s*\(|\bloopedSlides\b|\bslidesPerColumn(?:Fill)?\b|\bfreeMode(?:MinimumVelocity|Momentum|MomentumBounce|MomentumRatio|MomentumVelocityRatio|Sticky)\b|\blazy\s*:|swiper-lazy|require\s*\(\s*["'']swiper|addEventListener\s*\(\s*["''](?:slidechange|progress|reachbeginning|reachend|transitionstart|transitionend)["''])'
      regex: true
      caseSensitive: true
      filePattern: "**/*.{js,jsx,ts,tsx,mjs,cjs,vue,svelte,html,css,scss,less}"
      contextSize: 0
