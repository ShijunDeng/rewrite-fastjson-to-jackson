type: specs.openrewrite.org/v1beta/recipe
name: com.huawei.clouds.openrewrite.junitjupiteraggregate.AutoMigrateSelectedJUnitJupiterAggregateTo6_0_1
displayName: Automatically migrate selected JUnit Jupiter aggregate projects to 6.0.1
description: >-
  Capture exact dependency ownership, perform the selected dependency upgrade, and apply source automation only
