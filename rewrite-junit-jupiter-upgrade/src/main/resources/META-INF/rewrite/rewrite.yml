preconditions:
  - com.huawei.clouds.openrewrite.junitjupiteraggregate.FindSelectedJUnitJupiterAggregateFiles
recipeList:
  - com.huawei.clouds.openrewrite.junitjupiteraggregate.MigrateOfficialJUnitJupiter6Leaves
  - com.huawei.clouds.openrewrite.junitjupiteraggregate.MigrateDeterministicJUnitJupiter6Gaps
