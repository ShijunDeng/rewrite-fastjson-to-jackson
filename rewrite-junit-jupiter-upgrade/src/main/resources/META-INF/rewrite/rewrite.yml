displayName: Apply body-preserving JUnit 6 migrations not covered by safe official leaves
description: >-
  Preserve old interceptor bodies and replace removed Platform calls whose factory, Optional, UniqueId, or
  collection expression cannot be represented by the reviewed generic official leaves.
recipeList:
  - com.huawei.clouds.openrewrite.junitjupiteraggregate.MigrateJUnitJupiter6Java
  - com.huawei.clouds.openrewrite.junitjupiteraggregate.MigrateJUnit6RemovedPlatformJava
