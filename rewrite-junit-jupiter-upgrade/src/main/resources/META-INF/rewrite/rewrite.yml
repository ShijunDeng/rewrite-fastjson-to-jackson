---
type: specs.openrewrite.org/v1beta/recipe
name: com.huawei.clouds.openrewrite.junitjupiteraggregate.UpgradeJUnitJupiterTo6_0_1
displayName: Upgrade workbook-selected JUnit Jupiter aggregate dependencies to 6.0.1
description: >-
  Capture an exact non-conflicting source-version project before edits, use the official unified Maven/Gradle
  UpgradeDependencyVersion first, and retain the strict raw-syntax visitor as a fallback for unresolved build models.
recipeList:
  - com.huawei.clouds.openrewrite.junitjupiteraggregate.MarkSelectedJUnitJupiterAggregateProjects
  - com.huawei.clouds.openrewrite.junitjupiteraggregate.UpgradeSelectedJUnitJupiterAggregateWithOfficialFallback
---
type: specs.openrewrite.org/v1beta/recipe
name: com.huawei.clouds.openrewrite.junitjupiteraggregate.UpgradeSelectedJUnitJupiterAggregateWithOfficialFallback
displayName: Upgrade the selected JUnit Jupiter aggregate dependency
description: >-
  Upgrade only files whose nearest build root proved one exact workbook source version; the official model-aware
  recipe runs first and the existing strict visitor handles raw Maven or Gradle syntax that has no dependency model.
preconditions:
  - com.huawei.clouds.openrewrite.junitjupiteraggregate.FindSelectedJUnitJupiterAggregateFiles
recipeList:
  - org.openrewrite.java.dependencies.UpgradeDependencyVersion:
      groupId: org.junit.jupiter
      artifactId: junit-jupiter
      newVersion: 6.0.1
  - com.huawei.clouds.openrewrite.junitjupiteraggregate.UpgradeSelectedJUnitJupiterDependency
---
type: specs.openrewrite.org/v1beta/recipe
name: com.huawei.clouds.openrewrite.junitjupiteraggregate.MigrateOfficialJUnitJupiter6Leaves
displayName: Apply safe official JUnit 5.13, 5.14, and 6 migration leaves
description: >-
  Reuse individually reviewed OpenRewrite leaves without activating the broad JUnit5to6Migration aggregate,
  dependency widening, source deletion, configuration deletion, JRE pruning, or JUnit Pioneer migration.
recipeList:
  - org.openrewrite.java.ChangeMethodName:
      methodPattern: org.junit.jupiter.api.extension.ExtensionContext$Store getOrComputeIfAbsent(..)
      newMethodName: computeIfAbsent
      matchOverrides: true
      ignoreDefinition: true
  - org.openrewrite.java.testing.junit6.MigrateMethodOrdererAlphanumeric
  - com.huawei.clouds.openrewrite.junitjupiteraggregate.RepairMethodOrdererTypeMetadata
  - org.openrewrite.java.ReplaceConstantWithAnotherConstant:
      existingFullyQualifiedConstantName: org.junit.jupiter.params.ParameterizedTest.DISPLAY_NAME_PLACEHOLDER
      fullyQualifiedConstantName: org.junit.jupiter.params.ParameterizedInvocationConstants.DISPLAY_NAME_PLACEHOLDER
  - org.openrewrite.java.ReplaceConstantWithAnotherConstant:
      existingFullyQualifiedConstantName: org.junit.jupiter.params.ParameterizedTest.INDEX_PLACEHOLDER
      fullyQualifiedConstantName: org.junit.jupiter.params.ParameterizedInvocationConstants.INDEX_PLACEHOLDER
  - org.openrewrite.java.ReplaceConstantWithAnotherConstant:
      existingFullyQualifiedConstantName: org.junit.jupiter.params.ParameterizedTest.ARGUMENTS_PLACEHOLDER
      fullyQualifiedConstantName: org.junit.jupiter.params.ParameterizedInvocationConstants.ARGUMENTS_PLACEHOLDER
  - org.openrewrite.java.ReplaceConstantWithAnotherConstant:
      existingFullyQualifiedConstantName: org.junit.jupiter.params.ParameterizedTest.ARGUMENTS_WITH_NAMES_PLACEHOLDER
      fullyQualifiedConstantName: org.junit.jupiter.params.ParameterizedInvocationConstants.ARGUMENTS_WITH_NAMES_PLACEHOLDER
  - org.openrewrite.java.ReplaceConstantWithAnotherConstant:
      existingFullyQualifiedConstantName: org.junit.jupiter.params.ParameterizedTest.ARGUMENT_SET_NAME_PLACEHOLDER
      fullyQualifiedConstantName: org.junit.jupiter.params.ParameterizedInvocationConstants.ARGUMENT_SET_NAME_PLACEHOLDER
  - org.openrewrite.java.ReplaceConstantWithAnotherConstant:
      existingFullyQualifiedConstantName: org.junit.jupiter.params.ParameterizedTest.ARGUMENT_SET_NAME_OR_ARGUMENTS_WITH_NAMES_PLACEHOLDER
      fullyQualifiedConstantName: org.junit.jupiter.params.ParameterizedInvocationConstants.ARGUMENT_SET_NAME_OR_ARGUMENTS_WITH_NAMES_PLACEHOLDER
  - org.openrewrite.java.ReplaceConstantWithAnotherConstant:
      existingFullyQualifiedConstantName: org.junit.jupiter.params.ParameterizedTest.DEFAULT_DISPLAY_NAME
      fullyQualifiedConstantName: org.junit.jupiter.params.ParameterizedInvocationConstants.DEFAULT_DISPLAY_NAME
  - org.openrewrite.java.ChangeType:
      oldFullyQualifiedTypeName: org.junit.platform.engine.reporting.OutputDirectoryProvider
      newFullyQualifiedTypeName: org.junit.platform.engine.OutputDirectoryCreator
      ignoreDefinition: true
  - org.openrewrite.java.ChangeType:
      oldFullyQualifiedTypeName: org.junit.platform.commons.support.Resource
      newFullyQualifiedTypeName: org.junit.platform.commons.io.Resource
      ignoreDefinition: true
  - org.openrewrite.java.ChangeType:
      oldFullyQualifiedTypeName: org.junit.jupiter.api.extension.MediaType
      newFullyQualifiedTypeName: org.junit.jupiter.api.MediaType
      ignoreDefinition: true
  - org.openrewrite.java.ChangeType:
      oldFullyQualifiedTypeName: org.junit.jupiter.params.support.ParameterInfo
      newFullyQualifiedTypeName: org.junit.jupiter.params.ParameterInfo
      ignoreDefinition: true
  - org.openrewrite.java.ChangeMethodName:
      methodPattern: org.junit.platform.engine.discovery.DiscoverySelectors selectClasspathResource(java.util.Set)
      newMethodName: selectClasspathResourceByName
  - org.openrewrite.java.ChangeMethodName:
      methodPattern: org.junit.platform.engine.discovery.ClasspathResourceSelector getClasspathResources()
      newMethodName: getResources
  - org.openrewrite.java.ChangeType:
      oldFullyQualifiedTypeName: org.junit.jupiter.engine.Constants
      newFullyQualifiedTypeName: org.junit.jupiter.api.Constants
      ignoreDefinition: true
  - org.openrewrite.java.ChangeMethodName:
      methodPattern: org.junit.platform.testkit.engine.Executions started()
      newMethodName: finished
      matchOverrides: false
      ignoreDefinition: true
  - org.openrewrite.java.ChangeType:
      oldFullyQualifiedTypeName: org.junit.platform.commons.util.PreconditionViolationException
      newFullyQualifiedTypeName: org.junit.platform.commons.PreconditionViolationException
      ignoreDefinition: true
  - org.openrewrite.java.ChangeType:
      oldFullyQualifiedTypeName: org.junit.platform.commons.util.BlacklistedExceptions
      newFullyQualifiedTypeName: org.junit.platform.commons.util.UnrecoverableExceptions
      ignoreDefinition: true
  - org.openrewrite.java.ChangeMethodName:
      methodPattern: org.junit.platform.commons.util.UnrecoverableExceptions rethrowIfBlacklisted(java.lang.Throwable)
      newMethodName: rethrowIfUnrecoverable
      matchOverrides: false
      ignoreDefinition: true
  - org.openrewrite.java.ChangeMethodName:
      methodPattern: org.junit.platform.engine.discovery.MethodSelector getMethodParameterTypes()
      newMethodName: getParameterTypeNames
      matchOverrides: false
      ignoreDefinition: true
  - org.openrewrite.java.ChangeMethodName:
      methodPattern: org.junit.platform.engine.discovery.NestedMethodSelector getMethodParameterTypes()
      newMethodName: getParameterTypeNames
      matchOverrides: false
      ignoreDefinition: true
---
type: specs.openrewrite.org/v1beta/recipe
