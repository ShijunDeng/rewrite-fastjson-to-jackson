name: com.huawei.clouds.openrewrite.junitjupiteraggregate.MigrateSelectedJUnitJupiter6Sources
displayName: Migrate source only in workbook-selected JUnit Jupiter aggregate projects
description: >-
  Apply reviewed official leaves and local semantic-gap recipes only below a build root that proved one exact,
