recipeList:
  - com.huawei.clouds.openrewrite.junitjupiteraggregate.FindJUnitJupiter6SourceRisks
  - com.huawei.clouds.openrewrite.junitjupiteraggregate.FindJUnit6PlatformSourceRisks
  - com.huawei.clouds.openrewrite.junitjupiteraggregate.FindJUnitJupiter6ConfigurationRisks
---
type: specs.openrewrite.org/v1beta/recipe
name: com.huawei.clouds.openrewrite.junitjupiteraggregate.MigrateJUnitJupiterTo6_0_1
displayName: Migrate JUnit Jupiter aggregate 5.8.2/5.9.1/5.9.3 to 6.0.1
description: >-
  Capture exact source-version eligibility, upgrade through the official dependency recipe plus strict fallback,
  apply only reviewed official leaves and local semantic gaps, and mark unresolved decisions without deleting code.
recipeList:
  - com.huawei.clouds.openrewrite.junitjupiteraggregate.UpgradeJUnitJupiterTo6_0_1
  - com.huawei.clouds.openrewrite.junitjupiteraggregate.MigrateSelectedJUnitJupiter6Sources
  - com.huawei.clouds.openrewrite.junitjupiteraggregate.FindJUnitJupiter6BuildRisks
  - com.huawei.clouds.openrewrite.junitjupiteraggregate.FindSelectedJUnitJupiter6SourceAndConfigurationRisks
