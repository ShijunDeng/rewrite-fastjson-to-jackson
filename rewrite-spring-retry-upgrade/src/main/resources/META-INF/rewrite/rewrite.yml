type: specs.openrewrite.org/v1beta/recipe
name: com.huawei.clouds.openrewrite.springretry.MigrateSpringRetryTo2_0_13
displayName: Migrate Spring Retry 1.3.4 applications to 2.0.13
description: >-
  Upgrade the selected build to Java 17, strictly replace only Spring Retry
