---
type: specs.openrewrite.org/v1beta/recipe
name: com.huawei.clouds.openrewrite.springretry.UpgradeSpringRetryTo2_0_13
displayName: Upgrade Spring Retry 1.3.4 to 2.0.13
description: >-
  Upgrade only exact org.springframework.retry:spring-retry 1.3.4 declarations
  whose version is locally and unambiguously owned. Other versions are unchanged.
tags:
  - spring
  - retry
  - java
  - dependency-upgrade
recipeList:
  - com.huawei.clouds.openrewrite.springretry.UpgradeSelectedSpringRetryDependency
---
type: specs.openrewrite.org/v1beta/recipe
name: com.huawei.clouds.openrewrite.springretry.UpgradeSpringRetryBuildToJava17
displayName: Upgrade selected Spring Retry builds to Java 17
description: >-
  Run the fixed official UpgradeJavaVersion recipe only on authored build files
  that contain an exact locally resolved Spring Retry 1.3.4 declaration.
tags:
  - spring
  - retry
  - java17
  - official-openrewrite
preconditions:
  - com.huawei.clouds.openrewrite.springretry.FindSpringRetry134BuildFiles
recipeList:
  - org.openrewrite.java.migrate.UpgradeJavaVersion:
      version: 17
---
type: specs.openrewrite.org/v1beta/recipe
name: com.huawei.clouds.openrewrite.springretry.MigrateDeterministicSpringRetry20Java
displayName: Migrate deterministic Spring Retry 2.0 Java APIs
description: >-
  Reuse fixed official core recipes to replace deprecated annotation aliases
  and RetryTemplateBuilder.withinMillis without touching generated source.
tags:
  - spring
  - retry
  - java
  - official-openrewrite
preconditions:
  - com.huawei.clouds.openrewrite.springretry.FindAuthoredSourceFiles
recipeList:
  - org.openrewrite.java.ChangeAnnotationAttributeName:
      annotationType: org.springframework.retry.annotation.Retryable
      oldAttributeName: value
      newAttributeName: retryFor
  - org.openrewrite.java.ChangeAnnotationAttributeName:
      annotationType: org.springframework.retry.annotation.Retryable
      oldAttributeName: include
      newAttributeName: retryFor
  - org.openrewrite.java.ChangeAnnotationAttributeName:
      annotationType: org.springframework.retry.annotation.Retryable
      oldAttributeName: exclude
      newAttributeName: noRetryFor
  - org.openrewrite.java.ChangeAnnotationAttributeName:
      annotationType: org.springframework.retry.annotation.CircuitBreaker
      oldAttributeName: value
      newAttributeName: retryFor
  - org.openrewrite.java.ChangeAnnotationAttributeName:
      annotationType: org.springframework.retry.annotation.CircuitBreaker
      oldAttributeName: include
      newAttributeName: retryFor
  - org.openrewrite.java.ChangeAnnotationAttributeName:
      annotationType: org.springframework.retry.annotation.CircuitBreaker
      oldAttributeName: exclude
      newAttributeName: noRetryFor
  - org.openrewrite.java.ChangeMethodName:
      methodPattern: org.springframework.retry.support.RetryTemplateBuilder withinMillis(long)
      newMethodName: withTimeout
      matchOverrides: false
      ignoreDefinition: false
---
