name: Maven CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: maven-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  catalog:
    name: Migration Catalog / Offline Validation
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - name: Validate documentation-first catalog
        run: python3 scripts/validate_workbook_module_specs.py --offline

  verify:
    name: Maven / Java ${{ matrix.java }}
    runs-on: ubuntu-latest
    # The reactor currently contains more than 140 recipe modules and over
    # 16,000 tests. A complete verification already exceeded 30 minutes when
    # the reactor was roughly half this size.
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        java: [17, 21]
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - name: Set up Java
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: maven
      - name: Verify
        run: mvn -B -ntp -T 1C clean verify
      - name: Upload failing test reports
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: surefire-java-${{ matrix.java }}
          path: "**/target/surefire-reports/**"
          if-no-files-found: ignore
          retention-days: 7
