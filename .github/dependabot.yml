version: 2
updates:
  - package-ecosystem: maven
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "02:00"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 5
    # Recipe-module POMs intentionally model vulnerable/legacy source
    # versions. Only the root build toolchain is maintained by Dependabot.
    exclude-paths:
      - "rewrite-*-upgrade/**"
    # Branch protection requires every PR to be current with main.
    rebase-strategy: auto
    # Product-library versions are migration inputs/targets copied from the
    # approved spreadsheet. Updating them independently changes recipe
    # semantics, so Dependabot is limited to the recipe toolchain and build.
    allow:
      - dependency-name: "org.openrewrite:*"
      - dependency-name: "org.openrewrite.recipe:*"
      - dependency-name: "org.junit.jupiter:*"
      - dependency-name: "org.apache.maven.plugins:*"
    groups:
      openrewrite:
        patterns:
          - "org.openrewrite:*"
          - "org.openrewrite.recipe:*"
      maven-plugins:
        patterns:
          - "org.apache.maven.plugins:*"
    ignore:
      # Major versions in this repository often represent the intentionally old
      # API surface consumed by a migration fixture, not a production dependency.
      - dependency-name: "*"
        update-types:
          - version-update:semver-major

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "02:30"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 5
    rebase-strategy: auto
