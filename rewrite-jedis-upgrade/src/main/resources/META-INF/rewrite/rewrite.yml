type: specs.openrewrite.org/v1beta/recipe
name: com.huawei.clouds.openrewrite.jedis.FindManualJedis7MigrationRisks
displayName: Find Jedis 7 migration risks requiring manual review
description: Mark removed sharding and internal APIs, ambiguous construction, pool and cluster generics, return and exception changes, pipeline and transaction changes, removed command options, module behavior, SSL, timeout, and resource-lifetime risks.
tags:
  - jedis
  - java
  - search
  - manual-review
preconditions:
  - org.openrewrite.text.Find:
      find: 'redis\.clients\.jedis|\b(?:Jedis|Pipeline|Transaction|SetParams|ScanParams)\b'
      regex: true
      caseSensitive: true
      filePattern: "**/*.java"
      contextSize: 0
recipeList:
  - org.openrewrite.text.Find:
      find: '\b(?:ShardedJedisPool|ShardedJedis|BinaryShardedJedis|ShardedJedisPipeline|JedisShardInfo|ShardInfo|JedisSharding|ShardedPipeline|ShardedConnectionProvider)\b'
      regex: true
      caseSensitive: true
      filePattern: "**/*.java"
      contextSize: 0
  - org.openrewrite.text.Find:
      find: '\bnew[ \t]+(?:Jedis|JedisPool)[ \t]*\([ \t]*(?!["'']rediss?://[^"'']+["''][ \t]*\))[^,)]*\)'
      regex: true
      caseSensitive: true
      filePattern: "**/*.java"
      contextSize: 0
  - org.openrewrite.text.Find:
      find: '\bnew[ \t]+(?:Jedis|JedisPool|JedisCluster|JedisSentinelPool|UnifiedJedis)[ \t]*\([^;\r\n]{0,1200}\b(?:ssl|SSL|timeout|Timeout|password|clientName|maxAttempts)\b[^;\r\n]{0,1200}\)'
      regex: true
      caseSensitive: true
      filePattern: "**/*.java"
      contextSize: 0
  - org.openrewrite.text.Find:
      find: '\bGenericObjectPoolConfig[ \t]*<[ \t]*Jedis[ \t]*>(?=[\s\S]{0,4000}\bJedisCluster\b)|\.getClusterNodes[ \t]*\(|\.getConnectionFromSlot[ \t]*\('
      regex: true
      caseSensitive: true
      filePattern: "**/*.java"
      contextSize: 0
  - org.openrewrite.text.Find:
      find: '\.(?:getResource|returnResource|returnBrokenResource)[ \t]*\('
      regex: true
      caseSensitive: true
      filePattern: "**/*.java"
      contextSize: 0
  - org.openrewrite.text.Find:
      find: '\b(?:pipeline|pipelined)\.(?:multi|exec|discard)[ \t]*\(|\b(?:transaction|tx)\.execGetResponse[ \t]*\(|\b(?:transaction|tx)\.(?:watch|unwatch)[ \t]*\('
      regex: true
      caseSensitive: true
      filePattern: "**/*.java"
      contextSize: 0
  - org.openrewrite.text.Find:
      find: '\.(?:scriptExists|blpop|brpop|bzpopmin|bzpopmax|blmpop|bzmpop|configGet|zdiff|zdiffWithScores|zinter|zinterWithScores|zunion|zunionWithScores)[ \t]*\('
      regex: true
      caseSensitive: true
      filePattern: "**/*.java"
      contextSize: 0
  - org.openrewrite.text.Find:
      find: '\b(?:JedisNoReachableClusterNodeException|JedisClusterMaxAttemptsException|JedisExhaustedPoolException|AbortedTransactionException)\b|catch[ \t]*\([ \t]*(?:JedisDataException|IllegalStateException)\b'
      regex: true
      caseSensitive: true
      filePattern: "**/*.java"
      contextSize: 0
  - org.openrewrite.text.Find:
      find: '\bSetParams\b[^;\r\n]{0,500}\.get[ \t]*\(|\.xpending[ \t]*\([^;\r\n]{0,800},[^;\r\n]{0,800},[^;\r\n]{0,800},[^;\r\n]{0,800},[^;\r\n]{0,800},'
      regex: true
      caseSensitive: true
      filePattern: "**/*.java"
      contextSize: 0
  - org.openrewrite.text.Find:
      find: 'redis\.clients\.jedis\.(?:graph|gears)\.|\.(?:ftSearch|ftAggregate|ftProfile|setDefaultSearchDialect)[ \t]*\('
      regex: true
      caseSensitive: true
      filePattern: "**/*.java"
      contextSize: 0
  - org.openrewrite.text.Find:
      find: '\b(?:extends|implements)[ \t]+(?:Connection|JedisCluster|Pipeline|Transaction|AbstractPipeline|AbstractTransaction)\b|redis\.clients\.jedis\.(?:commands|util|builders|providers)\.'
      regex: true
      caseSensitive: true
      filePattern: "**/*.java"
      contextSize: 0
---
type: specs.openrewrite.org/v1beta/recipe
name: com.huawei.clouds.openrewrite.jedis.FindManualJedis7BuildBaselineRisks
displayName: Find Jedis 7 build baseline risks requiring manual review
description: Mark Java levels below 8 and explicit SLF4J API or Commons Pool declarations that must be checked against the fixed Jedis 7.2.1 build.
tags:
  - jedis
  - build
  - search
  - manual-review
recipeList:
  - org.openrewrite.text.Find:
      find: '<(?:maven\.compiler\.(?:source|target)|source|target)>[ \t]*(?:1\.[0-7]|[0-7])[ \t]*</|<(?:groupId)>org\.slf4j</groupId>[\s\S]{0,300}<artifactId>slf4j-api</artifactId>|<groupId>org\.apache\.commons</groupId>[\s\S]{0,300}<artifactId>commons-pool2</artifactId>'
      regex: true
      caseSensitive: true
      filePattern: "**/pom.xml"
      contextSize: 0
  - org.openrewrite.text.Find:
      find: '(?:sourceCompatibility|targetCompatibility|languageVersion)[ \t]*(?:=|\.set\(|\.of\()[ \t]*["'']?(?:1\.[0-7]|[0-7])\b|["'']org\.slf4j:slf4j-api:|["'']org\.apache\.commons:commons-pool2:'
      regex: true
      caseSensitive: true
      filePattern: "**/*.gradle;**/*.gradle.kts"
      contextSize: 0
---
